# Toponym Pairs Configuration
# Single source of truth for the entire pipeline.
# Add/remove/disable pairs here — pipeline handles the rest incrementally.

metadata:
  version: "2.0"
  description: "Ukrainian toponym pairs for adoption analysis"
  time_range: "2010-01-01 to 2026-12-31"

categories:
  geographical:
    name: "Geographical"
    description: "Cities, rivers, regions, and administrative areas"
  food:
    name: "Food & Cuisine"
    description: "Dishes, drinks, and food-related terms"
  landmarks:
    name: "Landmarks & Heritage Sites"
    description: "UNESCO sites, monasteries, historical landmarks"
  country:
    name: "Country-Level Framing"
    description: "Sovereignty and statehood markers"
  institutional:
    name: "Institutional"
    description: "Universities, churches, and organizations"
  sports:
    name: "Sports"
    description: "Football clubs, cultural exports"
  historical:
    name: "Historical"
    description: "Colonial-era terms, identity markers"
  people:
    name: "People"
    description: "Russian vs Ukrainian transliteration of prominent Ukrainian names"

